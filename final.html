<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>I’m Sorry Faith ❤️</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="hearts">
    <span class="heart"></span><span class="heart"></span><span class="heart"></span>
    <span class="heart"></span><span class="heart"></span><span class="heart"></span>
    <span class="heart"></span><span class="heart"></span><span class="heart"></span>
  </div>

  <main class="page">
    <div class="container">
      <h1>Faith ❤️</h1>
      
      <p>I know I went quiet on you… and I’m really sorry.</p>
      <p>Jokes aside, you didn’t deserve that.</p>
      <p>You mean a lot to me, and I hate that I made you feel otherwise.</p>
      <p>I’ll do better—not just say it.</p>

      <p><strong>Can you forgive me? 🥺</strong></p>

      <button onclick="forgive()">Yes ❤️</button>
      <button onmouseover="moveButton(this)">No </button>

      <p id="finalResponse"></p>

      <div id="flowerSurprise" class="flower-surprise" aria-live="polite">
        <div class="digital-flower" aria-hidden="true">🌸</div>
        <p class="flower-text">Please call me i realy miss you ❤️</p>
      </div>
    </div>
  </main>

  <audio autoplay loop>
    <source src="music/Hozier - From Eden (320).mp3" type="audio/mpeg">
  </audio>

  <script src="script.js"></script>
</body>
</html>
